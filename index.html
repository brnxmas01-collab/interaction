<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Awakening</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; }

    /* Canvas is the only visual — sized via JS at devicePixelRatio */
    #cv {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
      /* Prevent browser from adding any extra smoothing on top of ours */
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    /* Video is hidden — only used as a decode source */
    #vid { display: none; }

    /* Debug */
    #debug {
      position: fixed; top: 16px; left: 16px; z-index: 30;
      pointer-events: none;
      font-family: monospace; font-size: 13px; line-height: 2.1;
      color: #fff; background: rgba(0,0,0,0.65);
      padding: 10px 16px; border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.12);
    }
    #debug b  { color: rgba(255,255,255,0.35); font-weight: normal; }
    #debug em { color: #7cf; font-style: normal; }

    /* Start screen */
    #start-screen {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.88);
    }
    #start-screen.gone { display: none; }
    #start-btn {
      font-family: monospace; font-size: 16px;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 16px 48px; border: none; border-radius: 8px;
      background: #fff; color: #000; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Hidden video: decode source only -->
<video id="vid" src="public/focus_transition.mp4"
       muted playsinline preload="auto"></video>

<!-- Canvas: the actual display, rendered at devicePixelRatio -->
<canvas id="cv"></canvas>

<div id="debug">
  <div><b>hand         </b><em id="d-hand">false</em></div>
  <div><b>zone         </b><em id="d-zone">—</em></div>
  <div><b>handSize     </b><em id="d-size">—</em></div>
  <div><b>targetProg   </b><em id="d-tgt">0.000</em></div>
  <div><b>currentProg  </b><em id="d-cur">0.000</em></div>
  <div><b>time         </b><em id="d-time">0.000</em> s</div>
  <div><b>duration     </b><em id="d-dur">—</em> s</div>
  <div><b>dpr          </b><em id="d-dpr">—</em></div>
</div>

<div id="start-screen">
  <button id="start-btn">START</button>
</div>

<script type="module">

/* ══════════════════════════════════════════════════
   CONFIG — tune for your physical space
══════════════════════════════════════════════════ */
const DIST_FAR   = 0.10;  // hand size below → progress 0
const DIST_CLOSE = 0.38;  // hand size above → progress 1

// How fast currentProgress chases targetProgress.
// Lower = smoother / slower.
const LERP_APPROACH = 0.07;   // creature wakes up
const LERP_RETREAT  = 0.020;  // creature slowly falls asleep (~2–3s return)

const ZONE_LEFT_END    = 0.33;
const ZONE_RIGHT_START = 0.66;

/* ══════════════════════════════════════════════════
   DOM
══════════════════════════════════════════════════ */
const vid         = document.getElementById('vid');
const cv          = document.getElementById('cv');
const ctx         = cv.getContext('2d');
const startScreen = document.getElementById('start-screen');

const dHand = document.getElementById('d-hand');
const dZone = document.getElementById('d-zone');
const dSize = document.getElementById('d-size');
const dTgt  = document.getElementById('d-tgt');
const dCur  = document.getElementById('d-cur');
const dTime = document.getElementById('d-time');
const dDur  = document.getElementById('d-dur');
const dDpr  = document.getElementById('d-dpr');

/* ══════════════════════════════════════════════════
   CANVAS — high-DPI setup
   Canvas internal pixels = CSS pixels × dpr,
   so on a Retina screen we render at 2× resolution
   and the browser does no upscaling.
══════════════════════════════════════════════════ */
const DPR = Math.min(window.devicePixelRatio || 1, 3);
dDpr.textContent = DPR.toFixed(1);

function resizeCanvas() {
  cv.width  = Math.round(window.innerWidth  * DPR);
  cv.height = Math.round(window.innerHeight * DPR);
  // CSS size stays the same (fills viewport)
  cv.style.width  = window.innerWidth  + 'px';
  cv.style.height = window.innerHeight + 'px';
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); drawCurrentFrame(); });

/* ══════════════════════════════════════════════════
   DRAW — object-fit: cover at DPR resolution
   Scales the video frame so it fills the canvas,
   cropping equally on both sides if needed.
══════════════════════════════════════════════════ */
function drawCurrentFrame() {
  if (!vid.videoWidth) return;   // no frame decoded yet

  const cw = cv.width;   // canvas pixels (already × DPR)
  const ch = cv.height;
  const fw = vid.videoWidth;
  const fh = vid.videoHeight;

  // Cover: scale so the frame fills the canvas on both axes
  const scale = Math.max(cw / fw, ch / fh);
  const dw = fw * scale;
  const dh = fh * scale;
  const dx = (cw - dw) / 2;   // horizontal centering offset
  const dy = (ch - dh) / 2;   // vertical centering offset

  ctx.drawImage(vid, dx, dy, dw, dh);
}

// Draw as soon as a seek completes — never draw stale frames
vid.addEventListener('seeked', drawCurrentFrame);

/* ══════════════════════════════════════════════════
   VIDEO SETUP
══════════════════════════════════════════════════ */
let duration = 0;
vid.addEventListener('loadedmetadata', () => {
  duration = vid.duration;
  dDur.textContent = duration.toFixed(3);
  console.log('[Video] duration:', duration,
              ' size:', vid.videoWidth, '×', vid.videoHeight);
});
vid.load();

/* ══════════════════════════════════════════════════
   PROGRESS STATE
   targetProgress:  what the hand is asking for (0–1)
   currentProgress: what is actually displayed (lerps toward target)

   When the hand disappears → targetProgress goes to 0.
   currentProgress uses the slow LERP_RETREAT speed so
   the creature gradually returns to its dormant state —
   never an instant jump.
══════════════════════════════════════════════════ */
let targetProgress  = 0;
let currentProgress = 0;
let lastSeekTime    = -1;

function seekTo(t) {
  // Skip if the change is sub-frame (avoids thrashing the decoder)
  if (Math.abs(t - lastSeekTime) < 0.008) return;
  vid.currentTime = t;
  lastSeekTime    = t;
  // drawCurrentFrame() fires automatically via the 'seeked' event listener
}

/* ══════════════════════════════════════════════════
   HAND STATE
══════════════════════════════════════════════════ */
let handVisible = false;
let currentZone = null;
let lastZoneLog = null;
let landmarker  = null;
let camEl       = null;
let lastTs      = -1;

/* ══════════════════════════════════════════════════
   RENDER LOOP
══════════════════════════════════════════════════ */
function frame(ts) {
  requestAnimationFrame(frame);

  // Hand detection
  if (landmarker && camEl && camEl.readyState >= 2 && ts !== lastTs) {
    lastTs = ts;
    try { processHand(landmarker.detectForVideo(camEl, ts).landmarks); }
    catch {}
  }

  // ── Smooth interpolation ──────────────────────────────────────
  // Use faster lerp when approaching (waking up),
  // slower lerp when retreating (falling asleep).
  const approaching = targetProgress > currentProgress;
  const lerpSpeed   = approaching ? LERP_APPROACH : LERP_RETREAT;

  currentProgress += (targetProgress - currentProgress) * lerpSpeed;

  // Snap to exact target when close enough to avoid micro-drift
  if (Math.abs(targetProgress - currentProgress) < 0.0005) {
    currentProgress = targetProgress;
  }

  // ── Scrub video to currentProgress ───────────────────────────
  if (duration > 0) {
    const t = Math.max(0, Math.min(1, currentProgress)) * duration;
    seekTo(t);
  }

  // ── Debug ─────────────────────────────────────────────────────
  dHand.textContent = handVisible ? 'true' : 'false';
  dZone.textContent = currentZone ?? '—';
  dTgt.textContent  = targetProgress.toFixed(3);
  dCur.textContent  = currentProgress.toFixed(3);
  dTime.textContent = vid.currentTime.toFixed(3);
}
requestAnimationFrame(frame);

/* ══════════════════════════════════════════════════
   HAND PROCESSING
══════════════════════════════════════════════════ */
function calcHandSize(lm) {
  const w = lm[0], t = lm[12];
  const ar = innerWidth / innerHeight;
  return Math.sqrt(((t.x - w.x) * ar) ** 2 + (t.y - w.y) ** 2);
}
function getPalmX(lm) { return (lm[0].x + lm[5].x + lm[17].x) / 3; }
function getZone(nx) {
  const sx = 1 - nx;
  return sx < ZONE_LEFT_END ? 'left' : sx < ZONE_RIGHT_START ? 'center' : 'right';
}

function processHand(sets) {
  if (!sets || sets.length === 0) {
    if (handVisible) {
      handVisible = false;
      currentZone = lastZoneLog = null;
    }
    // No hand → target returns to 0.
    // currentProgress will drift back slowly via LERP_RETREAT.
    targetProgress = 0;
    return;
  }

  handVisible = true;
  const lm   = sets[0];
  const zone = getZone(getPalmX(lm));
  const size = calcHandSize(lm);

  if (zone !== currentZone) currentZone = zone;
  if (zone !== lastZoneLog) {
    lastZoneLog = zone;
    if (zone === 'left')  console.log('LEFT SENSE');
    if (zone === 'right') console.log('RIGHT SENSE');
  }

  if (zone === 'center') {
    // Continuous mapping: hand size → progress 0–1
    targetProgress = Math.max(0, Math.min(1,
      (size - DIST_FAR) / (DIST_CLOSE - DIST_FAR)
    ));
  } else {
    targetProgress = 0;
  }

  dSize.textContent = size.toFixed(3);
}

/* ══════════════════════════════════════════════════
   START BUTTON
   vid.play() must be called synchronously within the
   click handler to satisfy browser autoplay policy
   and unlock the video element for seeking.
══════════════════════════════════════════════════ */
startScreen.addEventListener('click', async () => {
  startScreen.classList.add('gone');

  // Unlock video seeking
  try {
    await vid.play();
    vid.pause();
    vid.currentTime = 0;
    console.log('[Video] unlocked');
  } catch(e) {
    console.warn('[Video] unlock failed:', e.name);
  }

  // Start camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
    });
    camEl = document.createElement('video');
    camEl.srcObject = stream; camEl.muted = true; camEl.playsInline = true;
    await camEl.play();
    await loadTracker();
  } catch(e) {
    console.warn('[Camera]', e.name);
  }
});

/* ══════════════════════════════════════════════════
   MEDIAPIPE
══════════════════════════════════════════════════ */
async function loadTracker() {
  try {
    const { HandLandmarker, FilesetResolver } = await import(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs'
    );
    const fsr = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    landmarker = await HandLandmarker.createFromOptions(fsr, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate: 'GPU',
      },
      runningMode: 'VIDEO',
      numHands: 1,
    });
    console.log('[MediaPipe] ready');
  } catch(e) { console.error('[MediaPipe]', e.message); }
}

</script>
</body>
</html>
