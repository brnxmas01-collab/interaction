<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Awakening</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; }

    #cv {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
    }

    /* Both video elements are hidden — decode sources only */
    #vid-imm, #vid-com { display: none; }

    /* Debug overlay */
    #debug {
      position: fixed; top: 16px; left: 16px; z-index: 30;
      pointer-events: none;
      font-family: monospace; font-size: 13px; line-height: 2.2;
      color: #fff; background: rgba(0,0,0,0.65);
      padding: 10px 16px; border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.12);
    }
    #debug b  { color: rgba(255,255,255,0.35); font-weight: normal; }
    #debug em { color: #7cf; font-style: normal; }

    /* Big state label */
    #d-state {
      display: block;
      font-size: 15px; font-weight: bold;
      letter-spacing: 0.15em; text-transform: uppercase;
      margin-bottom: 4px;
    }
    #d-state.dormant    { color: #888; }
    #d-state.immersion  { color: #afd; }
    #d-state.communion  { color: #fad; }
    #d-state.returning  { color: #fd8; }   /* retreating to switch */

    /* Camera preview */
    #cam-preview {
      position: fixed; right: 20px; bottom: 20px;
      width: 180px; height: auto;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.25);
      background: #000;
      z-index: 1000; opacity: 0.9;
      transform: scaleX(-1);
      display: none;
      pointer-events: none;
    }
    @media (max-width: 768px) {
      #cam-preview { width: 120px; right: 12px; bottom: 12px; }
    }

    /* Start screen */
    #start-screen {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.88);
    }
    #start-screen.gone { display: none; }
    #start-btn {
      font-family: monospace; font-size: 16px;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 16px 48px; border: none; border-radius: 8px;
      background: #fff; color: #000; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Hidden videos — decode sources only, canvas renders them -->
<video id="vid-imm" src="public/focus_transition.mp4"
       muted playsinline preload="auto"></video>
<video id="vid-com" src="public/communion_transition.mp4"
       muted playsinline preload="auto"></video>

<!-- Canvas: the only visible display, rendered at devicePixelRatio -->
<canvas id="cv"></canvas>

<!-- Camera preview — same stream as tracking, purely decorative -->
<video id="cam-preview" muted playsinline autoplay></video>

<div id="debug">
  <em id="d-state" class="dormant">DORMANT</em>
  <div><b>fingers  </b><em id="d-fingers">—</em></div>
  <div><b>pending  </b><em id="d-pending">—</em></div>
  <div><b>progress </b><em id="d-prog">0.000</em></div>
  <div><b>target   </b><em id="d-tgt">0.000</em></div>
  <div><b>time     </b><em id="d-time">0.000</em> s</div>
</div>

<div id="start-screen">
  <button id="start-btn">START</button>
</div>

<script type="module">

/* ══════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════ */
// Fixed step per frame (at 60fps):
//   0.009 × 60 = 0.54/s  →  ~1.9s to fully awaken
//   0.008 × 60 = 0.48/s  →  ~2.1s to fully return
const STEP_APPROACH = 0.009;
const STEP_RETREAT  = 0.008;

const ZONE_LEFT_END    = 0.33;
const ZONE_RIGHT_START = 0.66;

/* ══════════════════════════════════════════════════
   DOM
══════════════════════════════════════════════════ */
const vidImm      = document.getElementById('vid-imm');
const vidCom      = document.getElementById('vid-com');
const cv          = document.getElementById('cv');
const ctx         = cv.getContext('2d');
const startScreen = document.getElementById('start-screen');
const dState      = document.getElementById('d-state');
const dFingers    = document.getElementById('d-fingers');
const dPending    = document.getElementById('d-pending');
const dProg       = document.getElementById('d-prog');
const dTgt        = document.getElementById('d-tgt');
const dTime       = document.getElementById('d-time');

/* ══════════════════════════════════════════════════
   CANVAS — high-DPI setup
══════════════════════════════════════════════════ */
const DPR = Math.min(window.devicePixelRatio || 1, 3);

function resizeCanvas() {
  cv.width  = Math.round(window.innerWidth  * DPR);
  cv.height = Math.round(window.innerHeight * DPR);
  cv.style.width  = window.innerWidth  + 'px';
  cv.style.height = window.innerHeight + 'px';
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); drawCurrentFrame(); });

/* ══════════════════════════════════════════════════
   DRAW
   Always reads from the currently active video.
   Adds a black gradient at the bottom to mask
   the Kling AI watermark.
══════════════════════════════════════════════════ */
function drawCurrentFrame() {
  const v = getActiveVid();
  if (!v || !v.videoWidth) return;

  const cw = cv.width, ch = cv.height;
  const fw = v.videoWidth, fh = v.videoHeight;

  // Cover scaling
  const scale = Math.max(cw / fw, ch / fh);
  const dw = fw * scale, dh = fh * scale;
  const dx = (cw - dw) / 2, dy = (ch - dh) / 2;

  ctx.drawImage(v, dx, dy, dw, dh);

  // Watermark mask: gradient over bottom 12%
  const gradTop = ch * 0.88;
  const grad = ctx.createLinearGradient(0, gradTop, 0, ch);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,1)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, gradTop, cw, ch - gradTop);
}

/* ══════════════════════════════════════════════════
   VIDEO SETUP
══════════════════════════════════════════════════ */
let durImm = 0, durCom = 0;
vidImm.addEventListener('loadedmetadata', () => {
  durImm = vidImm.duration;
  console.log('[Imm] duration:', durImm, vidImm.videoWidth + 'x' + vidImm.videoHeight);
});
vidCom.addEventListener('loadedmetadata', () => {
  durCom = vidCom.duration;
  console.log('[Com] duration:', durCom, vidCom.videoWidth + 'x' + vidCom.videoHeight);
});
vidImm.load();
vidCom.load();

/* ══════════════════════════════════════════════════
   STATE MACHINE
   ───────────────────────────────────────────────
   displayState  — which video is being shown
                   'immersion' | 'communion'
                   (both start at frame 0 = dormant look)

   pendingState  — state to switch to once progress
                   returns to 0 during a cross-transition
                   null | 'immersion' | 'communion'

   progress      — 0–1, position in the active video
   progressTarget — where progress is headed (0 or 1)

   Gesture → state rules (evaluated every frame):
     ≥ 4 fingers  →  IMMERSION
     1 finger (index only)  →  COMMUNION
     0 fingers    →  return to dormant (progress → 0)
     2–3 fingers  →  hold (do not change progressTarget)

   Cross-transition (IMMERSION ↔ COMMUNION):
     Set pendingState + progressTarget = 0
     When progress reaches 0 → switch displayState
     New state awakens on next gesture frame automatically
══════════════════════════════════════════════════ */
let displayState   = 'immersion';  // which video is active
let pendingState   = null;
let progress       = 0;
let progressTarget = 0;

// Seek guard — prevents queuing seeks while one is in flight
let isSeeking    = false;
let lastSeekTime = -1;

function getActiveVid() {
  return displayState === 'communion' ? vidCom : vidImm;
}
function getActiveDur() {
  return displayState === 'communion' ? durCom : durImm;
}

// Clear seek guard and redraw when the active video's seek completes
vidImm.addEventListener('seeked', () => {
  if (displayState === 'immersion') { isSeeking = false; drawCurrentFrame(); }
});
vidCom.addEventListener('seeked', () => {
  if (displayState === 'communion') { isSeeking = false; drawCurrentFrame(); }
});

function seekActiveTo(t) {
  if (isSeeking) return;
  if (Math.abs(t - lastSeekTime) < 0.008) return;
  isSeeking    = true;
  lastSeekTime = t;
  getActiveVid().currentTime = t;
}

function switchToState(newState) {
  displayState = newState;
  isSeeking    = false;   // reset so new video can be sought immediately
  lastSeekTime = -1;
}

/* ══════════════════════════════════════════════════
   GESTURE → STATE UPDATER
   Called every render frame with current finger count
   (-1 = no hand detected)
══════════════════════════════════════════════════ */
function updateStateFromGesture(fingers) {
  // Step 1: if we've fully returned to 0 and a cross-transition is pending,
  // switch the active video now (before evaluating the gesture below)
  if (progress <= 0 && pendingState !== null) {
    switchToState(pendingState);
    pendingState = null;
    progress = 0;
  }

  // Step 2: evaluate current gesture
  if (fingers === -1 || fingers === 0) {
    // No hand or fist → retreat to dormant
    progressTarget = 0;
    pendingState   = null;  // cancel any queued cross-transition
    return;
  }

  if (fingers === 2 || fingers === 3) {
    // Neutral zone — hold whatever is currently happening
    return;
  }

  // fingers is 1 (COMMUNION) or ≥4 (IMMERSION)
  const wanted = fingers >= 4 ? 'immersion' : 'communion';

  if (displayState === wanted) {
    // Already in the right state → advance toward fully awake
    progressTarget = 1;
    pendingState   = null;
  } else if (progress <= 0.001) {
    // At (or essentially at) frame 0 → switch directly, no retreat needed
    switchToState(wanted);
    progressTarget = 1;
    pendingState   = null;
  } else {
    // Currently in the wrong state with progress > 0
    // → retreat to 0 first, then awaken the wanted state
    progressTarget = 0;
    pendingState   = wanted;
  }
}

/* ══════════════════════════════════════════════════
   HAND TRACKING STATE
══════════════════════════════════════════════════ */
let handVisible    = false;
let currentZone    = null;
let lastZoneLog    = null;
let currentFingers = -1;
let landmarker     = null;
let camEl          = null;
let lastTs         = -1;

/* ══════════════════════════════════════════════════
   RENDER LOOP
══════════════════════════════════════════════════ */
function frame(ts) {
  requestAnimationFrame(frame);

  // Run MediaPipe hand detection on every new camera frame
  if (landmarker && camEl && camEl.readyState >= 2 && ts !== lastTs) {
    lastTs = ts;
    try { processHand(landmarker.detectForVideo(camEl, ts).landmarks); }
    catch {}
  }

  // State machine + progress
  updateStateFromGesture(handVisible ? currentFingers : -1);

  if (progressTarget > progress) {
    progress = Math.min(progressTarget, progress + STEP_APPROACH);
  } else if (progressTarget < progress) {
    progress = Math.max(progressTarget, progress - STEP_RETREAT);
  }

  // Seek the active video to the current progress position
  const dur = getActiveDur();
  if (dur > 0) {
    seekActiveTo(Math.max(0, Math.min(1, progress)) * dur);
  }

  // Debug display
  const isReturning = pendingState !== null;
  const isDormant   = progress <= 0.001 && progressTarget <= 0;
  let stateLabel, stateClass;

  if (isReturning) {
    stateLabel = `${displayState.toUpperCase()} → ${pendingState.toUpperCase()}`;
    stateClass = 'returning';
  } else if (isDormant) {
    stateLabel = 'DORMANT';
    stateClass = 'dormant';
  } else {
    stateLabel = displayState.toUpperCase();
    stateClass = displayState;
  }

  dState.textContent   = stateLabel;
  dState.className     = stateClass;
  dFingers.textContent = currentFingers >= 0 ? String(currentFingers) : '—';
  dPending.textContent = pendingState ?? '—';
  dProg.textContent    = progress.toFixed(3);
  dTgt.textContent     = progressTarget.toFixed(3);
  dTime.textContent    = getActiveVid().currentTime.toFixed(3);
}
requestAnimationFrame(frame);

/* ══════════════════════════════════════════════════
   FINGER COUNTING
   Uses MediaPipe landmarks (normalized 0–1 coords).
   y increases downward, so tip.y < pip.y = finger up.

   Returns:
     0   = fist (all fingers down)       → DORMANT
     1   = index only (pointing)         → COMMUNION
     2–3 = partial (hold current state)
     ≥4  = open palm                     → IMMERSION
══════════════════════════════════════════════════ */
function calcHandSize(lm) {
  const w = lm[0], t = lm[12];
  const ar = innerWidth / innerHeight;
  return Math.sqrt(((t.x - w.x) * ar) ** 2 + (t.y - w.y) ** 2);
}

function countExtendedFingers(lm) {
  // 4 main fingers: tip y < pip y → extended
  const indexUp  = lm[8].y  < lm[6].y;
  const middleUp = lm[12].y < lm[10].y;
  const ringUp   = lm[16].y < lm[14].y;
  const pinkyUp  = lm[20].y < lm[18].y;
  let count = [indexUp, middleUp, ringUp, pinkyUp].filter(Boolean).length;

  // Thumb: tip far from MCP joint, normalized by hand size
  const sz  = calcHandSize(lm);
  const ar  = innerWidth / innerHeight;
  const tdx = (lm[4].x - lm[2].x) * ar;
  const tdy = lm[4].y - lm[2].y;
  if (sz > 0 && Math.sqrt(tdx * tdx + tdy * tdy) > sz * 0.4) count++;

  // "1 finger" for COMMUNION must be index only — nothing else up
  // (prevents 2-finger peace sign being misread as COMMUNION)
  if (count === 1 && !indexUp) return 2; // some other single finger → treat as hold

  return count;
}

/* ══════════════════════════════════════════════════
   HAND PROCESSING (called each MediaPipe frame)
══════════════════════════════════════════════════ */
function getPalmX(lm) { return (lm[0].x + lm[5].x + lm[17].x) / 3; }
function getZone(nx) {
  const sx = 1 - nx; // mirror-correct
  return sx < ZONE_LEFT_END ? 'left' : sx < ZONE_RIGHT_START ? 'center' : 'right';
}

function processHand(sets) {
  if (!sets || sets.length === 0) {
    if (handVisible) { handVisible = false; currentZone = lastZoneLog = null; }
    currentFingers = -1;
    return;
  }

  handVisible = true;
  const lm   = sets[0];
  const zone = getZone(getPalmX(lm));

  currentFingers = countExtendedFingers(lm);

  if (zone !== currentZone) currentZone = zone;
  if (zone !== lastZoneLog) {
    lastZoneLog = zone;
    if (zone === 'left')  console.log('LEFT SENSE');
    if (zone === 'right') console.log('RIGHT SENSE');
  }
}

/* ══════════════════════════════════════════════════
   START BUTTON
   Both videos must be play()→pause() unlocked inside
   the click handler to satisfy browser autoplay policy.
══════════════════════════════════════════════════ */
startScreen.addEventListener('click', async () => {
  startScreen.classList.add('gone');

  // Unlock both videos for seeking
  try {
    await vidImm.play(); vidImm.pause(); vidImm.currentTime = 0;
    await vidCom.play(); vidCom.pause(); vidCom.currentTime = 0;
    console.log('[Video] both unlocked');
  } catch(e) {
    console.warn('[Video] unlock failed:', e.name);
  }

  // Camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
    });

    // Hidden video for MediaPipe
    camEl = document.createElement('video');
    camEl.srcObject = stream; camEl.muted = true; camEl.playsInline = true;
    await camEl.play();

    // Visible preview in corner
    const preview = document.getElementById('cam-preview');
    preview.srcObject = stream;
    preview.style.display = 'block';

    await loadTracker();
  } catch(e) {
    console.warn('[Camera]', e.name);
  }
});

/* ══════════════════════════════════════════════════
   MEDIAPIPE
══════════════════════════════════════════════════ */
async function loadTracker() {
  try {
    const { HandLandmarker, FilesetResolver } = await import(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs'
    );
    const fsr = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    landmarker = await HandLandmarker.createFromOptions(fsr, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate: 'GPU',
      },
      runningMode: 'VIDEO',
      numHands: 1,
    });
    console.log('[MediaPipe] ready');
  } catch(e) { console.error('[MediaPipe]', e.message); }
}

</script>
</body>
</html>
