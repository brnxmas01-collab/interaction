<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Awakening</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; }

    #cv {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
    }

    /* Both videos hidden — decode sources only */
    #vid-imm, #vid-com { display: none; }

    /* ── Debug overlay ── */
    #debug {
      position: fixed; top: 16px; left: 16px; z-index: 30;
      pointer-events: none;
      font-family: monospace; font-size: 13px; line-height: 2.2;
      color: #fff; background: rgba(0,0,0,0.65);
      padding: 12px 18px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      min-width: 210px;
    }
    #debug .row { display: flex; justify-content: space-between; gap: 24px; }
    #debug .label { color: rgba(255,255,255,0.35); }
    #debug .val   { color: #7cf; }

    /* State label gets its own colour */
    #d-state.dormant   { color: #888; }
    #d-state.immersion { color: #afd; }
    #d-state.communion { color: #fad; }
    #d-state.returning { color: #fd8; }

    /* ── Camera preview ── */
    #cam-preview {
      position: fixed; right: 20px; bottom: 20px;
      width: 180px; height: auto;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.25);
      background: #000;
      z-index: 1000; opacity: 0.9;
      transform: scaleX(-1);   /* mirror */
      display: none;
      pointer-events: none;
    }
    @media (max-width: 768px) {
      #cam-preview { width: 120px; right: 12px; bottom: 12px; }
    }

    /* ── Start screen ── */
    #start-screen {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.88);
    }
    #start-screen.gone { display: none; }
    #start-btn {
      font-family: monospace; font-size: 16px;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 16px 48px; border: none; border-radius: 8px;
      background: #fff; color: #000; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Hidden videos — decode sources only -->
<video id="vid-imm" src="public/focus_transition.mp4"
       muted playsinline preload="auto"></video>
<video id="vid-com" src="public/communion_transition.mp4"
       muted playsinline preload="auto"></video>

<!-- Single canvas — the only thing the visitor sees -->
<canvas id="cv"></canvas>

<!-- Camera preview (bottom-right, mirrored) -->
<video id="cam-preview" muted playsinline autoplay></video>

<!-- Debug overlay -->
<div id="debug">
  <div class="row">
    <span class="label">Current State</span>
    <span class="val" id="d-state" class="dormant">DORMANT</span>
  </div>
  <div class="row">
    <span class="label">Current Zone</span>
    <span class="val" id="d-zone">—</span>
  </div>
  <div class="row">
    <span class="label">Hand Detected</span>
    <span class="val" id="d-hand">false</span>
  </div>
  <div class="row">
    <span class="label">Open Palm</span>
    <span class="val" id="d-open">false</span>
  </div>
  <div class="row">
    <span class="label">Progress</span>
    <span class="val" id="d-prog">0.000</span>
  </div>
</div>

<div id="start-screen">
  <button id="start-btn">START</button>
</div>

<script type="module">

/* ══════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════ */
// moveTowards step per frame at 60fps:
//   0.009 × 60 = 0.54/s  →  ~1.9 s to fully awaken
//   0.008 × 60 = 0.48/s  →  ~2.1 s to fully return
const STEP_APPROACH = 0.009;
const STEP_RETREAT  = 0.008;

// Zone boundaries (mirror-corrected x, 0 = left of screen)
const ZONE_LEFT_END    = 0.33;
const ZONE_RIGHT_START = 0.66;

// Open-palm threshold:
// A finger counts as extended if its tip is above its PIP joint
// by at least this margin (negative = forgives slight bending).
// 3+ extended fingers out of 4 = open palm.
const EXTEND_MARGIN   = -0.03;  // negative = accept slightly bent fingers
const OPEN_PALM_MIN   = 3;      // out of 4 main fingers (thumb excluded)

/* ══════════════════════════════════════════════════
   DOM
══════════════════════════════════════════════════ */
const vidImm      = document.getElementById('vid-imm');
const vidCom      = document.getElementById('vid-com');
const cv          = document.getElementById('cv');
const ctx         = cv.getContext('2d');
const startScreen = document.getElementById('start-screen');

const dState = document.getElementById('d-state');
const dZone  = document.getElementById('d-zone');
const dHand  = document.getElementById('d-hand');
const dOpen  = document.getElementById('d-open');
const dProg  = document.getElementById('d-prog');

/* ══════════════════════════════════════════════════
   CANVAS — devicePixelRatio setup
══════════════════════════════════════════════════ */
const DPR = Math.min(window.devicePixelRatio || 1, 3);

function resizeCanvas() {
  cv.width  = Math.round(window.innerWidth  * DPR);
  cv.height = Math.round(window.innerHeight * DPR);
  cv.style.width  = window.innerWidth  + 'px';
  cv.style.height = window.innerHeight + 'px';
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); drawCurrentFrame(); });

/* ══════════════════════════════════════════════════
   DRAW
   Reads from the active video, scales to cover,
   then applies a bottom gradient to mask watermark.
══════════════════════════════════════════════════ */
function drawCurrentFrame() {
  const v = getActiveVid();
  if (!v || !v.videoWidth) return;

  const cw = cv.width, ch = cv.height;
  const fw = v.videoWidth, fh = v.videoHeight;

  const scale = Math.max(cw / fw, ch / fh);
  const dw = fw * scale, dh = fh * scale;
  const dx = (cw - dw) / 2, dy = (ch - dh) / 2;

  ctx.drawImage(v, dx, dy, dw, dh);

  // Black gradient over bottom 12% — hides Kling AI watermark
  const gradTop = ch * 0.88;
  const grad = ctx.createLinearGradient(0, gradTop, 0, ch);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,1)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, gradTop, cw, ch - gradTop);
}

/* ══════════════════════════════════════════════════
   VIDEO SETUP
══════════════════════════════════════════════════ */
let durImm = 0, durCom = 0;
vidImm.addEventListener('loadedmetadata', () => {
  durImm = vidImm.duration;
  console.log('[Imm]', durImm.toFixed(2) + 's', vidImm.videoWidth + 'x' + vidImm.videoHeight);
});
vidCom.addEventListener('loadedmetadata', () => {
  durCom = vidCom.duration;
  console.log('[Com]', durCom.toFixed(2) + 's', vidCom.videoWidth + 'x' + vidCom.videoHeight);
});
vidImm.load();
vidCom.load();

/* ══════════════════════════════════════════════════
   STATE MACHINE
   ───────────────────────────────────────────────
   displayState   'immersion' | 'communion'
                  Both start at frame 0 = dormant look.
                  There is no separate "dormant" video —
                  dormant is simply progress = 0 on
                  whichever video is currently active.

   pendingState   null | 'immersion' | 'communion'
                  Set during a cross-sense transition.
                  When progress returns to 0, we switch
                  displayState to pendingState and begin
                  awakening the new sense.

   progress       0–1   current position in active video
   progressTarget 0–1   where progress is heading

   Gesture rules (evaluated every frame):
     open palm + CENTER  →  IMMERSION
     open palm + RIGHT   →  COMMUNION
     open palm + LEFT    →  hold (reserved for future sense)
     closed palm         →  return to DORMANT
     no hand             →  return to DORMANT
══════════════════════════════════════════════════ */
let displayState   = 'immersion'; // which video is active
let pendingState   = null;
let progress       = 0;
let progressTarget = 0;
let isSeeking      = false;
let lastSeekTime   = -1;

function getActiveVid() {
  return displayState === 'communion' ? vidCom : vidImm;
}
function getActiveDur() {
  return displayState === 'communion' ? durCom : durImm;
}

// Clear seek guard and redraw when a seek completes on the ACTIVE video
vidImm.addEventListener('seeked', () => {
  if (displayState === 'immersion') { isSeeking = false; drawCurrentFrame(); }
});
vidCom.addEventListener('seeked', () => {
  if (displayState === 'communion') { isSeeking = false; drawCurrentFrame(); }
});

function seekActiveTo(t) {
  if (isSeeking) return;
  if (Math.abs(t - lastSeekTime) < 0.008) return;
  isSeeking    = true;
  lastSeekTime = t;
  getActiveVid().currentTime = t;
}

function switchToState(newState) {
  displayState = newState;
  isSeeking    = false;  // reset so the new video can be sought immediately
  lastSeekTime = -1;
}

/* ══════════════════════════════════════════════════
   GESTURE → STATE UPDATER
   Called every render frame.
   hasHand  — hand landmarks were detected this frame
   isOpen   — open palm detected
   zone     — 'left' | 'center' | 'right' | null
══════════════════════════════════════════════════ */
function updateState(hasHand, isOpen, zone) {
  // If we've retreated to 0 and a cross-transition is queued, fire it now
  if (progress <= 0 && pendingState !== null) {
    switchToState(pendingState);
    pendingState = null;
    progress = 0;
  }

  // ── No hand, or hand is closed → return to dormant ──
  if (!hasHand || !isOpen) {
    progressTarget = 0;
    pendingState   = null;  // cancel any queued cross-transition
    return;
  }

  // ── Open palm detected ──
  if (zone === 'left') {
    // Reserved — hold whatever is currently happening
    return;
  }

  const wanted = zone === 'center' ? 'immersion' : 'communion';

  if (displayState === wanted) {
    // Already showing the right sense → advance toward fully awake
    progressTarget = 1;
    pendingState   = null;
  } else if (progress <= 0.001) {
    // At frame 0 → switch directly without needing to retreat
    switchToState(wanted);
    progressTarget = 1;
    pendingState   = null;
  } else {
    // Wrong sense is active with progress > 0
    // → retreat to 0 first, then awaken the wanted sense
    progressTarget = 0;
    pendingState   = wanted;
  }
}

/* ══════════════════════════════════════════════════
   HAND TRACKING STATE
══════════════════════════════════════════════════ */
let handVisible = false;
let openPalm    = false;
let currentZone = null;
let lastZoneLog = null;
let landmarker  = null;
let camEl       = null;
let lastTs      = -1;

/* ══════════════════════════════════════════════════
   RENDER LOOP
══════════════════════════════════════════════════ */
function frame(ts) {
  requestAnimationFrame(frame);

  // Hand detection
  if (landmarker && camEl && camEl.readyState >= 2 && ts !== lastTs) {
    lastTs = ts;
    try { processHand(landmarker.detectForVideo(camEl, ts).landmarks); }
    catch {}
  }

  // Update state from current gesture
  updateState(handVisible, openPalm, currentZone);

  // Advance progress toward target (fixed step = consistent, no stutter)
  if (progressTarget > progress) {
    progress = Math.min(progressTarget, progress + STEP_APPROACH);
  } else if (progressTarget < progress) {
    progress = Math.max(progressTarget, progress - STEP_RETREAT);
  }

  // Scrub the active video
  const dur = getActiveDur();
  if (dur > 0) seekActiveTo(Math.max(0, Math.min(1, progress)) * dur);

  // ── Debug display ──
  const isReturning = pendingState !== null;
  const isDormant   = progress <= 0.001 && progressTarget <= 0;

  let stateLabel, stateClass;
  if (isReturning) {
    stateLabel = `${displayState.toUpperCase()} → ${pendingState.toUpperCase()}`;
    stateClass = 'returning';
  } else if (isDormant) {
    stateLabel = 'DORMANT';
    stateClass = 'dormant';
  } else {
    stateLabel = displayState.toUpperCase();
    stateClass = displayState;
  }

  dState.textContent  = stateLabel;
  dState.className    = stateClass;
  dZone.textContent   = currentZone ? currentZone.toUpperCase() : '—';
  dHand.textContent   = handVisible ? 'true' : 'false';
  dOpen.textContent   = openPalm    ? 'true' : 'false';
  dProg.textContent   = progress.toFixed(3);
}
requestAnimationFrame(frame);

/* ══════════════════════════════════════════════════
   OPEN PALM DETECTION
   Counts how many of the 4 main fingers are extended
   (tip above PIP, with a forgiving negative margin so
   slightly bent fingers still count).
   3 or more out of 4 = open palm.
   Thumb excluded — unreliable across hand orientations.
══════════════════════════════════════════════════ */
function detectOpenPalm(lm) {
  let extended = 0;
  if (lm[8].y  < lm[6].y  - EXTEND_MARGIN) extended++;  // index
  if (lm[12].y < lm[10].y - EXTEND_MARGIN) extended++;  // middle
  if (lm[16].y < lm[14].y - EXTEND_MARGIN) extended++;  // ring
  if (lm[20].y < lm[18].y - EXTEND_MARGIN) extended++;  // pinky
  return extended >= OPEN_PALM_MIN;
}

/* ══════════════════════════════════════════════════
   ZONE DETECTION
   Uses mirror-corrected palm X so LEFT = visitor's left.
══════════════════════════════════════════════════ */
function getPalmX(lm) {
  // Average of wrist + index MCP + pinky MCP
  return (lm[0].x + lm[5].x + lm[17].x) / 3;
}

function getZone(lm) {
  const sx = 1 - getPalmX(lm);  // mirror-correct: MediaPipe x is flipped
  if (sx < ZONE_LEFT_END)    return 'left';
  if (sx < ZONE_RIGHT_START) return 'center';
  return 'right';
}

/* ══════════════════════════════════════════════════
   HAND PROCESSING (called each MediaPipe frame)
══════════════════════════════════════════════════ */
function processHand(sets) {
  if (!sets || sets.length === 0) {
    if (handVisible) { handVisible = false; currentZone = lastZoneLog = null; }
    openPalm = false;
    return;
  }

  const lm = sets[0];
  handVisible = true;
  openPalm    = detectOpenPalm(lm);
  const zone  = getZone(lm);

  if (zone !== currentZone) currentZone = zone;

  // Zone-change logging
  if (zone !== lastZoneLog) {
    lastZoneLog = zone;
    if (zone === 'left')  console.log('LEFT SENSE');
    if (zone === 'right') console.log('RIGHT SENSE');
  }
}

/* ══════════════════════════════════════════════════
   START BUTTON
   Both videos unlocked inside the click handler
   (required by browser autoplay policy).
══════════════════════════════════════════════════ */
startScreen.addEventListener('click', async () => {
  startScreen.classList.add('gone');

  try {
    await vidImm.play(); vidImm.pause(); vidImm.currentTime = 0;
    await vidCom.play(); vidCom.pause(); vidCom.currentTime = 0;
    console.log('[Video] both unlocked');
  } catch(e) { console.warn('[Video] unlock:', e.name); }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
    });

    // Hidden video for MediaPipe detection
    camEl = document.createElement('video');
    camEl.srcObject = stream; camEl.muted = true; camEl.playsInline = true;
    await camEl.play();

    // Visible mirrored preview (bottom-right)
    const preview = document.getElementById('cam-preview');
    preview.srcObject = stream;
    preview.style.display = 'block';

    await loadTracker();
  } catch(e) { console.warn('[Camera]', e.name); }
});

/* ══════════════════════════════════════════════════
   MEDIAPIPE
══════════════════════════════════════════════════ */
async function loadTracker() {
  try {
    const { HandLandmarker, FilesetResolver } = await import(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs'
    );
    const fsr = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    landmarker = await HandLandmarker.createFromOptions(fsr, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate: 'GPU',
      },
      runningMode: 'VIDEO',
      numHands: 1,
    });
    console.log('[MediaPipe] ready');
  } catch(e) { console.error('[MediaPipe]', e.message); }
}

</script>
</body>
</html>
